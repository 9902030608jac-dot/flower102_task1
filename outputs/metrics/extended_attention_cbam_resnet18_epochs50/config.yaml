experiment:
  name: extended_attention_cbam_resnet18_epochs50
  output_dir: outputs
assets:
  torch_home: assets/torch
data:
  root: data
  image_size: 224
  batch_size: 64
  num_workers: 4
  color_jitter: true
model:
  arch: resnet18
  num_classes: 102
  pretrained: true
  attention: cbam
train:
  epochs: 50
  optimizer: adamw
  backbone_lr: 0.0001
  head_lr: 0.001
  weight_decay: 0.0001
  scheduler: cosine
  warmup_epochs: 3
  amp: true
  grad_clip: 1.0
  seed: 42
logger:
  type: none

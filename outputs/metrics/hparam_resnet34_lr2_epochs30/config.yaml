experiment:
  name: hparam_resnet34_lr2_epochs30
  output_dir: outputs
assets:
  torch_home: assets/torch
data:
  root: data
  image_size: 224
  batch_size: 32
  num_workers: 4
  color_jitter: true
model:
  arch: resnet34
  num_classes: 102
  pretrained: true
  attention: none
train:
  epochs: 30
  optimizer: adamw
  backbone_lr: 5.0e-05
  head_lr: 0.0005
  weight_decay: 0.0001
  scheduler: cosine
  warmup_epochs: 3
  amp: true
  grad_clip: 1.0
  seed: 42
logger:
  type: none
